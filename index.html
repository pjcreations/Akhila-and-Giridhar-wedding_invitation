<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Javaji Family Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f1e6;
      --paper:#fcf8ef;
      --gold:#b59a63;
      --gold-soft:#dbc999;
      --green:#7b9352;
      --green-dark:#586f39;
      --ink:#6f6042;
      --ink-soft:#837353;
      --ivory:#fffaf2;
      --muted:#7e8c61;
      --line:rgba(123,147,82,0.22);
      --shadow:0 22px 60px rgba(96,80,48,0.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(145deg,#faf4ea 0%, #f3eadb 42%, #efe4d2 72%, #f8f1e7 100%);
      color:var(--ink);
      overflow-x:hidden;
      min-height:100vh;
    }
    .sparkles,.sparkles::before,.sparkles::after{
      position:fixed;inset:0;content:'';pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(255,240,200,.7) 0 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255,220,150,.45) 0 1px, transparent 2px);
      background-size:220px 220px,320px 320px;
      animation:floatStars 18s linear infinite;opacity:.16;
    }
    .sparkles::before{animation-duration:28s;opacity:.12}
    .sparkles::after{animation-duration:36s;opacity:.08}
    @keyframes floatStars{from{transform:translateY(0)}to{transform:translateY(-120px)}}

    .overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle at center, rgba(65,86,46,.52) 0%, rgba(36,46,25,.88) 55%, #1d2415 100%);transition:opacity 1s ease, visibility 1s ease, transform 1s ease;padding:24px}
    .overlay.hidden{opacity:0;visibility:hidden;transform:scale(1.04)}
    .overlay-card{width:min(92vw,680px);padding:42px 28px;border:1px solid rgba(216,199,157,.32);border-radius:36px;background:linear-gradient(180deg, rgba(255,252,246,.13), rgba(255,255,255,.05));backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,.28);position:relative;overflow:hidden}
    .overlay-card::before{content:'';position:absolute;inset:12px;border:1px solid rgba(216,199,157,.18);border-radius:28px;pointer-events:none}
    .intro-kicker,.tap-text,.caps{text-transform:uppercase;letter-spacing:.32em;color:var(--gold-soft)}
    .intro-kicker{font-size:.78rem;margin-bottom:18px}
    .tap-text{font-size:.72rem;margin-top:14px}
    .intro-title{font-family:'Cinzel',serif;font-size:clamp(1.9rem,4vw,3rem);line-height:1.2;margin-bottom:12px;color:var(--ivory)}
    .intro-sub{max-width:540px;margin:0 auto 28px;color:#efe7d4;line-height:1.8}
    .seal-wrap{display:flex;justify-content:center;margin:24px 0 18px}
    .seal{width:140px;height:140px;border-radius:50%;border:none;cursor:pointer;position:relative;background:radial-gradient(circle at 30% 30%, #fff4cf, #d5ab56 42%, #9a6e26 74%, #6c4a15 100%);box-shadow:0 0 0 8px rgba(216,181,106,.12),0 18px 40px rgba(0,0,0,.45),inset 0 3px 8px rgba(255,255,255,.35),inset 0 -6px 10px rgba(0,0,0,.25)}
    .seal::before{content:'';position:absolute;inset:10px;border-radius:50%;border:1.5px dashed rgba(97,57,7,.55)}
    .seal span{position:relative;z-index:1;font-family:'Cinzel',serif;font-size:2.1rem;color:#4f3207;font-weight:700;letter-spacing:.12em}
    .toolbar{position:fixed;top:18px;right:18px;z-index:50}
    .tool-btn{border:1px solid rgba(181,154,99,.24);background:rgba(74,93,51,.68);color:var(--ivory);padding:10px 14px;border-radius:999px;cursor:pointer;font-size:.88rem}
    .main{opacity:0;transform:translateY(24px);transition:opacity 1.1s ease, transform 1.1s ease}
    .main.show{opacity:1;transform:translateY(0)}
    .container{width:min(1180px, calc(100% - 28px));margin:0 auto}
    .hero{min-height:100vh;display:grid;place-items:center;padding:110px 0 70px}
    .hero-panel{width:100%;border:1px solid rgba(181,154,99,.24);border-radius:42px;background:linear-gradient(180deg, rgba(255,251,244,.92), rgba(249,242,231,.84));box-shadow:var(--shadow);padding:26px;position:relative;overflow:hidden}
    .hero-panel::after{content:'';position:absolute;inset:18px;border-radius:30px;border:1px solid rgba(181,154,99,.15);pointer-events:none}
    .trifold{position:relative;z-index:1;display:grid;grid-template-columns:.92fr 1.15fr .92fr;gap:18px;align-items:stretch}
    .panel{position:relative;background:linear-gradient(180deg, rgba(255,252,247,.97), rgba(245,235,219,.96));border:1px solid rgba(181,154,99,.22);border-radius:30px;padding:28px 24px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);min-height:660px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;text-align:center}
    .panel::before{content:'';position:absolute;inset:10px;border:1px solid rgba(181,154,99,.16);border-radius:22px;pointer-events:none}
    .panel::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at top left, rgba(123,147,82,.1), transparent 14%),radial-gradient(circle at bottom right, rgba(181,154,99,.12), transparent 16%);opacity:.8}
    .panel-middle{padding:34px 28px;min-height:700px}
</html>
