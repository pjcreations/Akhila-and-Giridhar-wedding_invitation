<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Javaji's Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Inter&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f5efe3;
  color:#6f6042;
}

.overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a1a12;
}

.overlay-card{
  text-align:center;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

.seal{
  width:120px;
  height:120px;
  border-radius:50%;
  background:gold;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
}

.main{display:none;padding:20px}

.main.show{display:block}

.couple{
  font-family:'Cinzel';
  font-size:36px;
  text-align:center;
}

.invite-family{
  margin-top:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- OPEN SCREEN -->
<div class="overlay" id="introGate">
  <div class="overlay-card">
    <h3>Javaji's Wedding Invitation</h3>
    <div class="seal" id="openInvite">UG</div>
    <p>Tap to open</p>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">

  <h1 class="couple">
    UMA ( Akhila ) <br>&amp; Giridhar Goud
  </h1>

  <div class="invite-family">
    <p><b>Inviting By</b></p>
    <p>
      SMT. Javaji Latha <br>
      Sri Javaji Yadagiri Goud
    </p>
    <p>
      Cell: 8500036603, 9948848050,<br>
      9640082759, 6302790292
    </p>
  </div>

  <div style="text-align:center;margin-top:20px">
    <p>📅 Sunday, 3rd May 2026</p>
    <p>⏰ 10:14 AM</p>
    <p>📍 Vallapu Reddy Ram Reddy Function Hall</p>

    <a href="https://maps.google.com/?q=Vallapu+Reddy+Ram+Reddy+Function+Hall+Kanchiraopally+Road+PEBBAIR+Wanaparthy+Dist" target="_blank">
      <button style="padding:10px 20px">Get Directions</button>
    </a>
  </div>

</div>

<script>
document.getElementById("openInvite").onclick = function(){
  document.getElementById("introGate").style.display="none";
  document.getElementById("mainContent").classList.add("show");
};
</script>

</body>
</html>
